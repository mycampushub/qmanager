<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
  </defs>

  <!-- Rounded rectangle background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle inner shadow / depth ring -->
  <rect x="8" y="8" width="496" height="496" rx="88" ry="88"
        fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- "QF" text centered -->
  <text x="256" y="296"
        font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, Arial, sans-serif"
        font-size="220"
        font-weight="700"
        fill="#ffffff"
        text-anchor="middle"
        dominant-baseline="central"
        letter-spacing="-4">QF</text>
</svg>