#:schemaPath = "schema.sql"

name = "queueflow"
main = ".open-next/worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ─── Environment Variables ────────────────────────────────────────────────────
[vars]
NODE_ENV = "production"
JWT_SECRET = "EzUybgmeD50ymbGacbN5rWVZzWg8ADllp78w7OaWiDg"

# ─── D1 Database Binding ─────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "queueflow-db"
database_id = "e5dfee80-f56a-4179-aa6b-0112eb032a83"
# Create with: wrangler d1 create queueflow-db

# ─── R2 Storage Binding (logos, branding assets, exports) ────────────────────
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "queueflow-storage"
# Create with: wrangler r2 bucket create queueflow-storage

# ─── Durable Objects (WebSocket real-time) ───────────────────────────────────
[[durable_objects.bindings]]
name = "QUEUE_WS"
class_name = "QueueWebSocket"

# Durable Object migrations
[[migrations]]
tag = "v1"
new_classes = ["QueueWebSocket"]

# ─── KV Namespace (rate limiting, session cache) ─────────────────────────────
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "54a197d9999441f28eac28b24ca2219e"
# Create with: wrangler kv namespace create "queueflow-rate-limit"

# ─── Build ───────────────────────────────────────────────────────────────────
[build]
command = "npm run build:cf"

# ─── Static Assets ───────────────────────────────────────────────────────────
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# ─── Development (wrangler dev) ─────────────────────────────────────────────
[dev]
port = 8787
local_protocol = "http"